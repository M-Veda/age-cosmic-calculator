  if((mo===1&&da>=20)||(mo===2&&da<=18))return SIGNS[1];
  if((mo===2&&da>=19)||(mo===3&&da<=20))return SIGNS[2];
  if((mo===3&&da>=21)||(mo===4&&da<=19))return SIGNS[3];
  if((mo===4&&da>=20)||(mo===5&&da<=20))return SIGNS[4];
  if((mo===5&&da>=21)||(mo===6&&da<=20))return SIGNS[5];
  if((mo===6&&da>=21)||(mo===7&&da<=22))return SIGNS[6];
  if((mo===7&&da>=23)||(mo===8&&da<=22))return SIGNS[7];
  if((mo===8&&da>=23)||(mo===9&&da<=22))return SIGNS[8];
  if((mo===9&&da>=23)||(mo===10&&da<=22))return SIGNS[9];
  if((mo===10&&da>=23)||(mo===11&&da<=21))return SIGNS[10];
  return SIGNS[11];
}
function getChinese(yr){const idx=(yr-1900)%12;return{animal:CHINESE[idx],sym:CH_SYM[idx],trait:CH_TRAITS[CHINESE[idx]]};}
function getNakshatra(mo,da,yr){const doy=Math.floor((new Date(yr,mo-1,da)-new Date(yr,0,0))/86400000);return NAKSHATRA[Math.floor((doy/365)*27)%27];}
function isLeap(y){return(y%4===0&&y%100!==0)||y%400===0;}
function dim(mo,yr){return[0,31,isLeap(yr)?29:28,31,30,31,30,31,31,30,31,30,31][mo];}
function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function mname(m){return['January','February','March','April','May','June','July','August','September','October','November','December'][m-1];}
function dow(y,m,d){return['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date(y,m-1,d).getDay()];}

function doCalc(){
  const da=parseInt(document.getElementById('d').value),mo=parseInt(document.getElementById('m').value),yr=parseInt(document.getElementById('y').value);
  const errBox=document.getElementById('err'),out=document.getElementById('out');
  errBox.style.display='none';
  ['d','m','y'].forEach(id=>document.getElementById(id).classList.remove('err'));
  let err='';
  if(!document.getElementById('d').value||!document.getElementById('m').value||!document.getElementById('y').value){
    err='Please fill in day, month and year.';
    ['d','m','y'].forEach(id=>{if(!document.getElementById(id).value)document.getElementById(id).classList.add('err');});
  } else if(isNaN(da)||isNaN(mo)||isNaN(yr)){
    err='Please enter valid numeric values.';
  } else if(mo<1||mo>12){
    err='Month must be between 1 and 12.';document.getElementById('m').classList.add('err');
  } else if(da<1||da>dim(mo,yr)){
    err=`Day must be between 1 and ${dim(mo,yr)} for ${mname(mo)} ${yr}.`;document.getElementById('d').classList.add('err');
  } else if(yr<1900||yr>2099){
    err='Year must be between 1900 and 2099.';document.getElementById('y').classList.add('err');
  } else {
    const dob=new Date(yr,mo-1,da),now=new Date();
    if(dob>now){err='Date of birth cannot be in the future.';['d','m','y'].forEach(id=>document.getElementById(id).classList.add('err'));}
  }
  if(err){errBox.textContent=err;errBox.style.display='block';out.classList.remove('visible');return;}
  renderAll(da,mo,yr);
}

function renderAll(da,mo,yr){
  const now=new Date();
  const dob=new Date(yr,mo-1,da);
  let years=now.getFullYear()-yr,months=now.getMonth()-(mo-1),days=now.getDate()-da;
  if(days<0){months--;days+=new Date(now.getFullYear(),now.getMonth(),0).getDate();}
  if(months<0){years--;months+=12;}
  const totalDays=Math.floor((now-dob)/86400000);
  const totalWeeks=Math.floor(totalDays/7);
  const totalMonths=years*12+months;
  const totalHrs=totalDays*24;
  const nextBday=new Date(now.getFullYear(),mo-1,da);
  if(nextBday<=now)nextBday.setFullYear(now.getFullYear()+1);
  const daysToNext=Math.ceil((nextBday-now)/86400000);
  const isToday=(now.getDate()===da&&(now.getMonth()+1)===mo);

  document.getElementById('main-cards').innerHTML=`
    <div class="mc"><span class="ml">Years</span><div class="mv">${years}</div><span class="ms">&nbsp;</span></div>
    <div class="mc"><span class="ml">Months</span><div class="mv">${months}</div><span class="ms">this year</span></div>
    <div class="mc"><span class="ml">Days</span><div class="mv">${days}</div><span class="ms">this month</span></div>`;

  document.getElementById('extra-cards').innerHTML=`
    <div class="ec"><div class="ec-icon"><i class="ti ti-calendar" aria-hidden="true"></i></div><div class="ec-info"><span class="ec-lbl">Total days</span><span class="ec-val">${totalDays.toLocaleString()}</span></div></div>
    <div class="ec"><div class="ec-icon"><i class="ti ti-stack" aria-hidden="true"></i></div><div class="ec-info"><span class="ec-lbl">Total weeks</span><span class="ec-val">${totalWeeks.toLocaleString()}</span></div></div>
    <div class="ec"><div class="ec-icon"><i class="ti ti-columns" aria-hidden="true"></i></div><div class="ec-info"><span class="ec-lbl">Total months</span><span class="ec-val">${totalMonths.toLocaleString()}</span></div></div>
    <div class="ec"><div class="ec-icon"><i class="ti ti-clock" aria-hidden="true"></i></div><div class="ec-info"><span class="ec-lbl">Total hours</span><span class="ec-val">${totalHrs.toLocaleString()}</span></div></div>
    <div class="ec"><div class="ec-icon"><i class="ti ti-sun" aria-hidden="true"></i></div><div class="ec-info"><span class="ec-lbl">Born on a</span><span class="ec-val">${dow(yr,mo,da)}</span></div></div>
    <div class="ec"><div class="ec-icon"><i class="ti ti-user" aria-hidden="true"></i></div><div class="ec-info"><span class="ec-lbl">Current age</span><span class="ec-val">${years} yrs, ${months} mo</span></div></div>`;

  document.getElementById('bday-row').innerHTML=isToday
    ?`<div class="bday-badge"><i class="ti ti-confetti" aria-hidden="true"></i>Happy Birthday! You turn ${years} today.</div>`
    :`<div class="bday-bar"><div><span class="bday-lbl">Next birthday</span><div class="bday-val">${ordinal(da)} ${mname(mo)} ${nextBday.getFullYear()}</div></div><div class="bday-count">${daysToNext}<span>days away</span></div></div>`;

  const ws=getWestern(mo,da);
  const ch=getChinese(yr);
  const nak=getNakshatra(mo,da,yr);
  const st=STONES[ws.n];
  const lc=LUCK_COLORS[ws.n];
  const ln=LUCK_NUMS[ws.n];

  document.getElementById('zodiac-hero').innerHTML=`
    <div class="zh-top">
      <div class="zh-sym">${ws.sym}</div>
      <div class="zh-info">
        <h3>${ws.n}</h3>
        <p>${ws.date} &middot; ${ws.el} &middot; ${ws.mod} &middot; Ruled by ${ws.ru}</p>
        <div class="zh-pills">${ws.traits.map(t=>`<span class="pill">${t}</span>`).join('')}</div>
      </div>
    </div>
    <div class="zh-grid">
      <div class="zh-card"><div class="zh-card-lbl">Chinese zodiac</div><div class="zh-card-val">${ch.sym} ${ch.animal} (${yr})</div><div class="zh-card-sub">${ch.trait}</div></div>
      <div class="zh-card"><div class="zh-card-lbl">Vedic nakshatra</div><div class="zh-card-val">${nak.n}</div><div class="zh-card-sub">Ruler: ${nak.ru} &middot; ${nak.q}</div></div>
    </div>
    <div class="stone-row">
      <div class="stone-dot" style="background:${st.color};border:1px solid rgba(0,0,0,.2)"></div>
      <span class="stone-text">Birthstone: <strong>${st.stone}</strong></span>
      <span class="stone-sub">&middot; Alternate: ${st.alt}</span>
    </div>
    <div class="luck-row">
      <div class="luck-card"><div class="luck-lbl">Lucky colors</div><div class="luck-vals">${lc.map(c=>`<span class="luck-pill">${c}</span>`).join('')}</div></div>
      <div class="luck-card"><div class="luck-lbl">Lucky numbers</div><div class="luck-vals">${ln.map(n=>`<span class="luck-pill">${n}</span>`).join('')}</div></div>
    </div>
    <div style="margin-top:12px">
      <div class="zh-card-lbl" style="margin-bottom:8px">Love compatibility</div>
      <div class="compat-grid">${ws.compat.map(c=>`
        <div class="compat-item">
          <div class="compat-sign">${c.s}</div>
          <div class="compat-name">${c.n}</div>
          <div class="compat-level">${c.l}% match</div>
          <div class="compat-bar"><div class="compat-fill" style="width:${c.l}%"></div></div>
        </div>`).join('')}
      </div>
    </div>`;

  const out=document.getElementById('out');
  out.classList.remove('visible');
  void out.offsetWidth;
  out.classList.add('visible');

  fetchHoroscope(ws,ch,nak,years);
}

async function fetchHoroscope(ws,ch,nak,age){
  const hc=document.getElementById('horo-card');
  hc.innerHTML='<div class="horo-loading"><div class="horo-spin"></div>Generating your cosmic reading…</div>';

  // -------------------------------------------------------
  // PASTE YOUR GROQ API KEY BELOW (from console.groq.com)
  const API_KEY = "YOUR_GROQ_API_KEY";
  // -------------------------------------------------------

  try{
    const prompt=`You are a professional astrologer and psychologist. The user is ${age} years old, Western sign: ${ws.n} (${ws.el}, ${ws.mod}, ruled by ${ws.ru}), Chinese zodiac: ${ch.animal}, Vedic Nakshatra: ${nak.n} (ruled by ${nak.ru}).

Write a rich, personalised cosmic reading with exactly these four sections. Use plain text only, no markdown, no asterisks, no bullet points.

DAILY_HOROSCOPE: (2-3 sentences of today's horoscope for ${ws.n}, specific and insightful)

PERSONALITY: (3-4 sentences blending Western, Chinese and Vedic insights. Be specific and avoid generic statements.)

LOVE: (2-3 sentences about their love style and romantic tendencies.)

STRENGTHS: (2 sentences about their core strengths and life purpose.)

Return ONLY these four labelled sections. No intro or outro.`;

    const res=await fetch(
      'https://api.groq.com/openai/v1/chat/completions',
      {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'Authorization':`Bearer ${GROQ_API_KEY}`
        },
        body:JSON.stringify({
          model:'llama-3.3-70b-versatile',
          max_tokens:1024,
          messages:[
            {role:'system',content:'You are a professional astrologer and psychologist who writes rich, personalised cosmic readings.'},
            {role:'user',content:prompt}
          ]
        })
      }
    );
    const data=await res.json();
    if(data.error){throw new Error(data.error.message);}
    const raw=data.choices?.[0]?.message?.content||'';
    const get=(label)=>{const rx=new RegExp(label+':\\s*([\\s\\S]*?)(?=(?:DAILY_HOROSCOPE|PERSONALITY|LOVE|STRENGTHS):|$)');const m=raw.match(rx);return m?m[1].trim():'';};
    const daily=get('DAILY_HOROSCOPE'),pers=get('PERSONALITY'),love=get('LOVE'),str=get('STRENGTHS');
    if(!daily&&!pers){throw new Error('Empty response');}
    hc.innerHTML=`
      <div class="horo-section"><div class="horo-sec-lbl"><i class="ti ti-sun" aria-hidden="true"></i>Today's horoscope</div><div class="horo-text">${daily}</div></div>
      <div class="divider"></div>
      <div class="horo-section"><div class="horo-sec-lbl"><i class="ti ti-user" aria-hidden="true"></i>Personality</div><div class="horo-text">${pers}</div></div>
      <div class="divider"></div>
      <div class="horo-section"><div class="horo-sec-lbl"><i class="ti ti-heart" aria-hidden="true"></i>Love & relationships</div><div class="horo-text">${love}</div></div>
      <div class="divider"></div>
      <div class="horo-section"><div class="horo-sec-lbl"><i class="ti ti-star" aria-hidden="true"></i>Strengths & purpose</div><div class="horo-text">${str}</div></div>`;
  }catch(e){
    hc.innerHTML=`<div class="horo-text" style="color:var(--color-text-secondary)">Could not load horoscope: ${e.message}. Check your Groq API key and try again.</div>`;
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')doCalc();});
</script>
